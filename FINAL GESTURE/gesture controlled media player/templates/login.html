<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gesture YouTube Player</title>
    <link rel="stylesheet" href="../static/css/login.css">
</head>
<body>
    <!-- Back Button -->
    <button class="back-btn" title="Go Back" onclick="history.back()">
        <i class="fa-solid fa-arrow-left"></i>
    </button>

    <!-- theme toggle removed - single palette enforced -->

    <div class="auth-container">
        <div class="auth-card">

            <!-- 3D animation -->
            <div class="lottie-box">
                <lottie-player
                    src="https://assets10.lottiefiles.com/packages/lf20_jcikwtux.json"
                    background="transparent"
                    speed="1"
                    loop
                    autoplay>
                </lottie-player>
            </div>

            <h2><i class="fa-solid fa-lock"></i> Login</h2>

            <div id="alert-container"></div>

            <form id="login-form">

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>

                <button type="submit" class="btn">
                    <span id="login-text">Login</span>
                    <div class="spinner" id="login-spinner"></div>
                </button>

            </form>

            <div class="auth-links">
                <p>New user? <a href="{{ url_for('register') }}">Register</a></p>
                <p><a href="{{ url_for('home') }}">← Back</a></p>
            </div>

        </div>
    </div>

            
            <!-- Demo Credentials
            <div style="margin-top: 30px; padding: 15px; background: #f8f9fa; border-radius: 10px; border-left: 4px solid var(--p2);">
                <h4 style="margin: 0 0 10px 0; color: var(--p2);">🧪 Demo Credentials</h4>
                <p style="margin: 5px 0; font-size: 0.9rem;">Email: demo@example.com</p>
                <p style="margin: 5px 0; font-size: 0.9rem;">Password: demo123</p>
                <button id="use-demo" class="btn btn-secondary" style="margin-top: 10px; padding: 8px 15px; font-size: 0.9rem;">
                    Use Demo Credentials
                </button>
            </div> -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <script>
    // theme toggle removed - nothing to handle here

    document.addEventListener('DOMContentLoaded', function() {
        const loginForm = document.getElementById('login-form');
        const loginText = document.getElementById('login-text');
        const loginSpinner = document.getElementById('login-spinner');
        const alertContainer = document.getElementById('alert-container');

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showAlert('Please fill in all fields', 'error');
                return;
            }

            // Show loading
            loginText.style.display = 'none';
            loginSpinner.style.display = 'block';

            try {
                const response = await fetch('/login', {   // ❗ update after you confirm backend route
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/instructions';
                    }, 900);
                } else {
                    showAlert(data.error || 'Login failed', 'error');
                }
            } catch (error) {
                showAlert('Network error. Please try again.', 'error');
            } finally {
                loginText.style.display = 'inline';
                loginSpinner.style.display = 'none';
            }
        });

        function showAlert(message, type) {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alert.style.display = 'block';

            alertContainer.innerHTML = '';
            alertContainer.appendChild(alert);

            if (type === 'success') {
                setTimeout(() => alert.remove(), 3000);
            }
        }
    });
</script>

</body>
</html>
